# Runs lint + typecheck on every push and PR to main.
#
# Deployment itself is handled by Vercel's Git integration (already
# connected — every push to main auto-deploys to production, and every
# other branch/PR gets a preview URL). This workflow is the quality gate
# in front of that: it catches type errors and lint issues in GitHub
# before you look at the Vercel deploy.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 24 to match the Vercel project's runtime (and the npm major
      # that generated package-lock.json — npm 10 rejects it as out of sync).
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # `npm install`, not `npm ci`: the lockfile contains wasm32-wasi
      # optional deps (@emnapi/* under @unrs/resolver-binding-wasm32-wasi)
      # that npm fails to record in a way `npm ci` accepts — a fresh
      # `npm install` + `npm ci --dry-run` fails even on the machine that
      # generated the lockfile (known npm bug with platform-gated
      # optionalDependencies).
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
