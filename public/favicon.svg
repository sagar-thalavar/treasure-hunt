<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Black background -->
  <rect width="32" height="32" rx="6" fill="#000000"/>
  <!-- Treasure chest body -->
  <rect x="6" y="16" width="20" height="11" rx="1.5" fill="white"/>
  <!-- Chest lid -->
  <path d="M6 16 Q6 10 16 10 Q26 10 26 16 Z" fill="white"/>
  <!-- Lid highlight arc -->
  <path d="M8 16 Q8 12 16 12 Q24 12 24 16" fill="#000" stroke="none"/>
  <!-- Lock -->
  <rect x="14" y="18" width="4" height="3.5" rx="1" fill="#000"/>
  <path d="M14.5 18.5 Q14.5 16.5 16 16.5 Q17.5 16.5 17.5 18.5" fill="none" stroke="#000" stroke-width="1.2"/>
  <!-- Coins spilling out -->
  <ellipse cx="13" cy="15.5" rx="2" ry="1" fill="white" opacity="0.9"/>
  <ellipse cx="19" cy="15" rx="2" ry="1" fill="white" opacity="0.9"/>
  <ellipse cx="16" cy="14.5" rx="2" ry="1" fill="white"/>
</svg>
